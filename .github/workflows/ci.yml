name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Zsh
        run: sudo apt-get update && sudo apt-get install --yes zsh
      - name: Syntax check
        run: zsh -n syncpick install
      - name: Tests
        run: ./tests/test.sh
