name: Bug report
description: Report unexpected syncpick behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include real hosts, usernames, IP addresses, paths, or sensitive transfer output."
  - type: input
    id: version
    attributes: { label: syncpick version, placeholder: "syncpick --version" }
    validations: { required: true }
  - type: input
    id: platform
    attributes: { label: OS and version, placeholder: "macOS 15.0" }
    validations: { required: true }
  - type: textarea
    id: command
    attributes: { label: Command and sanitized profile details, description: "Use placeholders for private values." }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: textarea
    id: actual
    attributes: { label: Actual behavior and sanitized output }
    validations: { required: true }
